services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: galimoto
      POSTGRES_PASSWORD: galimoto
      POSTGRES_DB: galimoto_hub
    ports:
      - "5432:5432"
    volumes:
      - galimoto_pgdata:/var/lib/postgresql/data

volumes:
  galimoto_pgdata:
